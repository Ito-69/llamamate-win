name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore src/LlamaMate.App/LlamaMate.App.csproj

      - name: Build
        run: dotnet build src/LlamaMate.App/LlamaMate.App.csproj -c Release -r win-x64 --no-restore

      - name: Publish self-contained EXE
        shell: pwsh
        run: |
          dotnet publish src/LlamaMate.App/LlamaMate.App.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:Version="1.0.0.0"
          $publishDir = "src\LlamaMate.App\bin\Release\net8.0-windows\win-x64\publish"
          Write-Host "Published to: $publishDir"
          Get-ChildItem $publishDir | Select-Object Name, Length

      - name: Try to create MSIX package
        id: msix
        continue-on-error: true
        shell: pwsh
        run: |
          $msixScript = ".\packaging\make-msix.ps1"
          if (Test-Path $msixScript) {
            & $msixScript -Configuration Release -Version "1.0.0.0"
          } else {
            Write-Host "::warning::make-msix.ps1 not found, skipping MSIX"
          }

      - name: Compute SHA256 of EXE
        shell: pwsh
        run: |
          $exePath = "src\LlamaMate.App\bin\Release\net8.0-windows\win-x64\publish\LlamaMate.exe"
          $hash = Get-FileHash -Path $exePath -Algorithm SHA256
          Write-Host "LlamaMate.exe SHA256: $($hash.Hash)"
          Set-Content -Path "exe-sha256.txt" -Value $hash.Hash

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "./release-artifacts" -Force | Out-Null
          $publishDir = "src\LlamaMate.App\bin\Release\net8.0-windows\win-x64\publish"

          # Copy EXE artifact
          Copy-Item -Path "$publishDir\LlamaMate.exe" -Destination "./release-artifacts/LlamaMate-1.0.0.exe"

          # Copy SHA256
          Copy-Item -Path "exe-sha256.txt" -Destination "./release-artifacts/LlamaMate-1.0.0.exe.sha256"

          # Copy MSIX if it was created
          Get-ChildItem "packaging/output/*.msix" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination "./release-artifacts/$($_.Name)"
            $h = Get-FileHash -Path $_.FullName -Algorithm SHA256
            Set-Content -Path "./release-artifacts/$($_.Name).sha256" -Value $h.Hash
          }

          Get-ChildItem "./release-artifacts" | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LlamaMate-MSIX
          path: ./release-artifacts
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: LlamaMate-MSIX
          path: ./release-artifacts

      - name: Generate release body
        id: release_body
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')

          $hasMsix = (Get-ChildItem "./release-artifacts/*.msix" -ErrorAction SilentlyContinue | Measure-Object).Count -gt 0

          $body = @"
          ## LlamaMate $version for Windows

          First public release.

          ### Download
          - **LlamaMate-$version.exe** \u2014 self-contained portable executable (recommended for testing)
          - **LlamaMate-$version.msix** \u2014 Windows app package $(if ($hasMsix) { '' } else { '(not included in this build)' })

          ### Quick start (portable EXE)
          1. Download `LlamaMate-$version.exe`
          2. Double-click to run
          3. On first launch, the app will offer to install `llama.cpp` and a small test model
          4. The app lives in the system tray

          ### Install via winget (when MSIX is published)
          ```powershell
          winget install Ito-69.LlamaMate
          ```

          ### Requirements
          - Windows 10 or later (x64)
          - Internet connection for first-time llama.cpp + model download
          "@
          Set-Content -Path "release-body.md" -Value $body

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: LlamaMate ${{ github.ref_name }}
          body_path: release-body.md
          files: |
            release-artifacts/*.exe
            release-artifacts/*.msix
            release-artifacts/*.sha256
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
