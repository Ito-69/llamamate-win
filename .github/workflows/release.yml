name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore src/LlamaMate.App/LlamaMate.App.csproj

      - name: Build
        run: dotnet build src/LlamaMate.App/LlamaMate.App.csproj -c Release -r win-x64 --no-restore

      - name: Install Windows SDK (for makeappx.exe)
        shell: pwsh
        run: |
          # Install Windows 10 SDK via choco (provides makeappx.exe and signtool.exe)
          choco install --no-progress windows-sdk-10-version-2104 -y
          # Refresh PATH so the new tools are visible
          $sdkBin = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -ErrorAction SilentlyContinue |
                    Where-Object { $_.PSIsContainer } |
                    Sort-Object Name -Descending |
                    Select-Object -First 1
          if ($sdkBin) {
            $envPath = $env:Path + ";" + (Join-Path $sdkBin.FullName "x64")
            Write-Host "SDK bin: $($sdkBin.FullName)\x64"
          }

      - name: Create MSIX package
        shell: pwsh
        run: |
          .\packaging\make-msix.ps1 -Configuration Release -Version "1.0.0.0"

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: LlamaMate-MSIX
          path: packaging/output/*.msix
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download MSIX
        uses: actions/download-artifact@v4
        with:
          name: LlamaMate-MSIX
          path: ./release-artifacts

      - name: Generate release body
        id: release_body
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $body = @"
          ## LlamaMate $version for Windows

          Download the MSIX package below and install via:

          ```powershell
          winget install Ito-69.LlamaMate
          ```

          Or sideload:
          1. Download `LlamaMate-$version.msix`
          2. Double-click to install (click "More info" → "Run anyway" if SmartScreen blocks)
          "@
          Set-Content -Path "release-body.md" -Value $body

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: LlamaMate ${{ github.ref_name }}
          body_path: release-body.md
          files: |
            release-artifacts/*.msix
            release-artifacts/*.sha256
          draft: false
          prerelease: false
